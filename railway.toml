# Railway Configuration for Polyglot System
# Services are defined separately and share resources (Redis, MySQL)

[[services]]
name = "go-tracking-core"
type = "build"
dockerfile = "go-tracking-core/Dockerfile"
workingDirectory = "."
port = 8080

[services.build]
builder = "dockerfile"

[services.variables]
REDIS_ADDR = "${{ Redis.host }}:${{ Redis.port }}"
PORT = "8080"

[[services]]
name = "php-control-plane"
type = "build"
dockerfile = "php-control-plane/Dockerfile"
workingDirectory = "."
port = 80

[services.variables]
DB_HOST = "${{ MySQL.MYSQL_HOST }}"
DB_NAME = "railway_db"
DB_USER = "railway_user"
DB_PASS = "${{ MySQL.MYSQL_PASSWORD }}"
REDIS_HOST = "${{ Redis.host }}"
REDIS_PORT = "${{ Redis.port }}"

[[services]]
name = "transit-python-cluster"
type = "build"
dockerfile = "transit-python-cluster/Dockerfile"
workingDirectory = "."

[services.variables]
REDIS_HOST = "${{ Redis.host }}"
REDIS_PORT = "${{ Redis.port }}"

# Shared Infrastructure
[[plugins]]
type = "redis"
name = "Redis"
version = "7"

[[plugins]]
type = "mysql"
name = "MySQL"
version = "8.0"
databaseName = "railway_db"
username = "railway_user"
