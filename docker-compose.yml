version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: railway_db
      MYSQL_USER: railway_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-railway123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./php-control-plane/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  go-tracking-core:
    build:
      context: .
      dockerfile: go-tracking-core/Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - redis
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      PORT: 8080

  php-control-plane:
    build:
      context: .
      dockerfile: php-control-plane/Dockerfile
    ports:
      - "80:80"
    depends_on:
      - mysql
      - redis
    environment:
      DB_HOST: mysql
      DB_NAME: railway_db
      DB_USER: railway_user
      DB_PASS: ${MYSQL_PASSWORD:-railway123}
      REDIS_HOST: redis
      REDIS_PORT: 6379

  transit-python-cluster:
    build:
      context: .
      dockerfile: transit-python-cluster/Dockerfile
    depends_on:
      - redis
    environment:
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}

volumes:
  redis_data:
  mysql_data:
